<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teresa Fernández · La Buena Letra</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream: #F7F3EC; --ink: #1A1612; --sepia: #8B6F4E; --gold: #C4973A; --muted: #6B5D52; }
    html, body { min-height: 100%; background: var(--cream); color: var(--ink); font-family: 'Lato', sans-serif; }
    .screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 3rem 2rem; }
    .ornament { font-size: 2rem; color: var(--gold); letter-spacing: 0.35em; margin-bottom: 1.5rem; }
    .title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 3rem); font-weight: 600; color: var(--ink); margin-bottom: 1rem; }
    .subtitle { font-family: 'Playfair Display', serif; font-style: italic; color: var(--muted); font-size: 1.1rem; margin-bottom: 2rem; }
    .divider { width: 50px; height: 1px; background: var(--gold); margin: 0 auto 2rem; }
    .btn { display: inline-block; background: var(--ink); color: var(--cream); text-decoration: none; padding: 0.85rem 2.2rem; font-family: 'Lato', sans-serif; font-size: 0.8rem; letter-spacing: 0.22em; text-transform: uppercase; transition: background 0.2s; }
    .btn:hover { background: var(--sepia); }
  </style>
</head>
<body>
  <div class="screen">
    <div class="ornament">❧ ❧ ❧</div>
    <h1 class="title">Próximamente</h1>
    <p class="subtitle">Teresa Fernández prepara su primera publicación</p>
    <div class="divider"></div>
    <a class="btn" href="index.html">← Volver al inicio</a>
  </div>
</body>
</html>
